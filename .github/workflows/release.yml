name: Build and Release NullifyPDF

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
      - 'CHANGELOG.md'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # <--- EVITA CHE WINDOWS VENGA CANCELLATO SE LINUX FALLISCE
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyMuPDF customtkinter Pillow presidio-analyzer spacy
          python -m spacy download en_core_web_md
          python -m spacy download it_core_news_md

      - name: Estrazione Versione
        shell: bash
        run: |
          VERSION=$(python -c "import re; print(re.search(r'__version__\s*=\s*[\'\"]([^\'\"]+)[\'\"]', open('NullifyPDF.py', encoding='utf-8').read()).group(1))")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build con PyInstaller
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            pyinstaller --noconsole --onefile \
              --collect-all customtkinter --collect-all presidio_analyzer --collect-all spacy \
              --collect-all en_core_web_md --collect-all it_core_news_md \
              --add-data "images;images" --icon="images/NullifyPDF_icon.ico" \
              --name "NullifyPDF" NullifyPDF.py
          else
            pyinstaller --noconsole --onefile \
              --collect-all customtkinter --collect-all presidio_analyzer --collect-all spacy \
              --collect-all en_core_web_md --collect-all it_core_news_md \
              --add-data "images:images" --icon="images/NullifyPDF_icon.png" \
              --name "NullifyPDF" NullifyPDF.py
          fi

      - name: Creazione pacchetti Linux (.deb & .rpm)
        if: matrix.os == 'ubuntu-latest'
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          # Installazione pulita di alien e dipendenze rpm
          sudo apt-get update && sudo apt-get install -y alien rpm devscripts
          
          # Fix conflitto build-id
          echo '%_build_id_links none' > ~/.rpmmacros
          
          # Creazione struttura cartelle
          mkdir -p package/DEBIAN package/usr/bin package/usr/share/applications package/usr/share/pixmaps
          
          # Verifica e copia eseguibile
          if [ -f dist/NullifyPDF ]; then
            cp dist/NullifyPDF package/usr/bin/nullify-pdf
            chmod +x package/usr/bin/nullify-pdf
          else
            echo "ERRORE: Eseguibile non trovato in dist/" && exit 1
          fi
          
          # Verifica e copia icona (se manca non blocca la build ma avvisa)
          if [ -f images/NullifyPDF_icon.png ]; then
            cp images/NullifyPDF_icon.png package/usr/share/pixmaps/nullify-pdf.png
          else
            echo "WARNING: Icona non trovata, uso un placeholder vuoto"
            touch package/usr/share/pixmaps/nullify-pdf.png
          fi
          
          # Launcher desktop
          cat <<EOF > package/usr/share/applications/nullify-pdf.desktop
          [Desktop Entry]
          Name=NullifyPDF
          Comment=AI-Powered PDF Anonymization Tool
          Exec=/usr/bin/nullify-pdf
          Icon=nullify-pdf
          Terminal=false
          Type=Application
          Categories=Utility;Security;
          EOF
          
          # File control per Debian
          cat <<EOF > package/DEBIAN/control
          Package: nullify-pdf
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Graziano Mariella
          Description: AI-Powered PDF Anonymization Tool
          EOF
          
          # Build DEB
          dpkg-deb --build package nullify-pdf_${VERSION}_amd64.deb
          
          # Build RPM via Alien (forziamo i permessi)
          sudo alien --to-rpm --scripts --rpm-set-permissions nullify-pdf_${VERSION}_amd64.deb
          
          # Ridenominazione sicura
          ACTUAL_RPM=$(ls *.rpm | head -n 1)
          if [ -n "$ACTUAL_RPM" ]; then
            mv "$ACTUAL_RPM" "nullify-pdf-${VERSION}.x86_64.rpm"
          else
            echo "ERRORE: RPM non generato" && exit 1
          fi

      - name: Rinomina Asset Finali
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            mv dist/NullifyPDF.exe NullifyPDF_v${{ env.VERSION }}_Windows.exe
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            mv dist/NullifyPDF NullifyPDF_v${{ env.VERSION }}_macOS
          else
            mv nullify-pdf_${{ env.VERSION }}_amd64.deb NullifyPDF_v${{ env.VERSION }}_Ubuntu.deb
            mv nullify-pdf-${{ env.VERSION }}.x86_64.rpm NullifyPDF_v${{ env.VERSION }}_Fedora.rpm
          fi

      - name: Creazione Release su GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/main')
        with:
          tag_name: v${{ env.VERSION }}
          name: NullifyPDF v${{ env.VERSION }}
          fail_on_unmatched_files: false
          files: |
            NullifyPDF_v${{ env.VERSION }}_*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}