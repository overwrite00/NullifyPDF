name: Build and Release NullifyPDF

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
      - 'CHANGELOG.md'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyMuPDF customtkinter Pillow presidio-analyzer spacy
          python -m spacy download en_core_web_md
          python -m spacy download it_core_news_md

      - name: Estrazione Versione
        shell: bash
        run: |
          VERSION=$(python -c "import re; print(re.search(r'__version__\s*=\s*[\'\"]([^\'\"]+)[\'\"]', open('NullifyPDF.py', encoding='utf-8').read()).group(1))")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build con PyInstaller
        shell: bash
        run: |
          # Utilizzo di shell bash garantisce compatibilità dei path anche su Windows
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            pyinstaller --noconsole --onefile \
              --collect-all customtkinter \
              --collect-all presidio_analyzer \
              --collect-all spacy \
              --collect-all en_core_web_md \
              --collect-all it_core_news_md \
              --add-data "images;images" \
              --icon="images/NullifyPDF_icon.ico" \
              --name "NullifyPDF" NullifyPDF.py
          else
            pyinstaller --noconsole --onefile \
              --collect-all customtkinter \
              --collect-all presidio_analyzer \
              --collect-all spacy \
              --collect-all en_core_web_md \
              --collect-all it_core_news_md \
              --add-data "images:images" \
              --icon="images/NullifyPDF_icon.png" \
              --name "NullifyPDF" NullifyPDF.py
          fi

      - name: Creazione pacchetti .deb e .rpm
        if: matrix.os == 'ubuntu-latest'
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          # Installazione alien E rpm (necessario per la conversione)
          sudo apt-get update && sudo apt-get install -y alien rpm
          
          mkdir -p package/DEBIAN
          mkdir -p package/usr/bin
          
          cat <<EOF > package/DEBIAN/control
          Package: nullify-pdf
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Graziano Mariella
          Description: AI-Powered PDF Anonymization Tool
          EOF
          
          cp dist/NullifyPDF package/usr/bin/nullify-pdf
          chmod +x package/usr/bin/nullify-pdf
          
          dpkg-deb --build package nullify-pdf_${VERSION}_amd64.deb
          
          # Generazione RPM e pulizia nome
          sudo alien --to-rpm --scripts nullify-pdf_${VERSION}_amd64.deb
          RPM_NAME=$(ls *.rpm)
          mv "$RPM_NAME" "nullify-pdf-${VERSION}.x86_64.rpm"

      - name: Rinomina Asset Finale
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            mv dist/NullifyPDF.exe NullifyPDF_v${{ env.VERSION }}_Windows.exe
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            mv dist/NullifyPDF NullifyPDF_v${{ env.VERSION }}_macOS
          else
            mv nullify-pdf_${{ env.VERSION }}_amd64.deb NullifyPDF_v${{ env.VERSION }}_Ubuntu.deb
            mv nullify-pdf-${{ env.VERSION }}.x86_64.rpm NullifyPDF_v${{ env.VERSION }}_Fedora.rpm
          fi

      - name: Creazione Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/main')
        with:
          tag_name: v${{ env.VERSION }}
          name: NullifyPDF v${{ env.VERSION }}
          draft: false
          prerelease: false
          # IMPORTANTE: fail_on_unmatched_files evita il crash della matrix
          fail_on_unmatched_files: false
          files: |
            NullifyPDF_v${{ env.VERSION }}_*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}