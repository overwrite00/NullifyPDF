name: Build NullifyPDF Enterprise

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install System Dependencies for Qt6 (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libegl1 binutils

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 PyMuPDF presidio-analyzer spacy pyinstaller

      - name: Download spaCy AI Models
        run: |
          python -m spacy download en_core_web_md
          python -m spacy download it_core_news_md

      - name: Compile Application with PyInstaller
        run: python build_local.py

      - name: Ensure Executable Permissions (Linux)
        if: runner.os == 'Linux'
        run: chmod +x dist/NullifyPDF_*

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NullifyPDF-v2.0.4-${{ runner.os }}
          path: dist/NullifyPDF*
          retention-days: 7
