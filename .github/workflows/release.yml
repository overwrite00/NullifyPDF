name: Build and Release NullifyPDF

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libegl1 binutils

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 PyMuPDF presidio-analyzer spacy pyinstaller

      - name: Download AI Models
        run: |
          python -m spacy download en_core_web_md
          python -m spacy download it_core_news_md

      - name: Build Local
        run: python build_local.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ runner.os }}
          path: dist/NullifyPDF_v*

  create_release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-builds
          pattern: build-*
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-builds/NullifyPDF_v*
          body: |
            ## NullifyPDF v2.0.4 - Enterprise Edition

            Questa versione segna il passaggio al framework **PySide6 (Qt6)** per una stabilità e performance senza precedenti.

            ### Novità:
            - **Multithreading:** Analisi AI fluida senza blocchi dell'interfaccia.
            - **Drag & Drop:** Supporto nativo per trascinamento file.
            - **Log Semantici:** Feedback visivo migliorato.
            - **Forensic Scrubbing:** Pulizia profonda di metadati e build-id PDF.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
