name: Auto-approve own pull requests

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  approve:
    name: Auto-approve PR by maintainer
    runs-on: ubuntu-latest
    if: github.actor == 'overwrite00'
    steps:
      - name: Approve pull request
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: '✅ Auto-approved by maintainer workflow'
            })
